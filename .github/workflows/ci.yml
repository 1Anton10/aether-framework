name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Test IR + compiler
        run: cargo test -p aether_ir -p aether_compiler

  node:
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: cargo build -p aether_compiler
      - run: npm run build -w aether_runtime
      - run: npm run smoke
      - run: npm run smoke:syntax
      - run: npm run publish:check
      - run: npm run bench:public
      - uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: site/bench-results.json

  e2e:
    runs-on: ubuntu-latest
    needs: node
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: cargo build -p aether_compiler
      - run: npm run build -w aether_runtime
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test
        env:
          CI: "1"
