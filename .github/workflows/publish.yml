name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: npm
      - run: npm ci
      - run: npm run build -w aether_runtime
      - run: npm run publish:check
      # Prefer OIDC trusted publishing when configured on npmjs.com
      # (GitHub user 1Anton10 / repo aether-framework / workflow publish.yml).
      # Fallback: secrets.NPM_TOKEN must be a granular token with
      # packages:write + Bypass 2FA (required when account 2FA is on).
      - name: Publish packages
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          publish_one() {
            local pkg="$1"
            local ver attempt
            ver=$(node -e "
              const {execSync}=require('child_process');
              const raw=execSync('npm pkg get version -w '+JSON.stringify(process.argv[1]),{encoding:'utf8'}).trim();
              let v; try { v=JSON.parse(raw); } catch { v=raw.replace(/^\"|\"$/g,''); }
              if (v && typeof v==='object') v=Object.values(v)[0];
              process.stdout.write(String(v));
            " "$pkg")
            if npm view "$pkg@$ver" version >/dev/null 2>&1; then
              echo "Skip $pkg@$ver (already on npm)"
              return 0
            fi
            for attempt in 1 2 3 4 5 6; do
              echo "Publishing $pkg@$ver (attempt $attempt)…"
              if npm publish --workspace "$pkg" --access public --provenance \
                || npm publish --workspace "$pkg" --access public; then
                sleep 25
                return 0
              fi
              echo "Publish failed for $pkg — waiting 90s (rate limit / transient)…"
              sleep 90
            done
            echo "Giving up on $pkg"
            return 1
          }
          for pkg in aether-std aether_runtime aether_ssr aether_cli create-aether vite-plugin-aether aether-adapter aether-compat-react aether-compat-vue aether-compat-svelte aether-compat-solid aether-compat-qwik aether-compat-lit aether-compat-angular; do
            publish_one "$pkg"
          done
